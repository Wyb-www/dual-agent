version: "3.9"

services:
  backend:
    build: ./backend
    container_name: dual-agent-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/config.yaml:/app/config.yaml:ro
      - backend_data:/app/data
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - SERPER_API_KEY=${SERPER_API_KEY:-}
    restart: unless-stopped

  frontend:
    image: python:3.11-slim
    container_name: dual-agent-frontend
    working_dir: /app
    command: >
      sh -c "pip install -q streamlit requests && streamlit run app.py --server.port=8501 --server.address=0.0.0.0"
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
